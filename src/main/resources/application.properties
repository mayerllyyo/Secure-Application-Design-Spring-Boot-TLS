# ─── Server ───────────────────────────────────────────────────────────────────
# Port is overridden at runtime by the PORT env variable (see SecurewebApplication).
server.port=5000

# ─── TLS / HTTPS ──────────────────────────────────────────────────────────────
# The format used for the keystore (PKCS12 is the recommended standard format).
server.ssl.key-store-type=PKCS12

# Path to the keystore file.
# Read from the KEYSTORE_PATH environment variable; falls back to the bundled test keystore.
server.ssl.key-store=${KEYSTORE_PATH:classpath:keystore/ecikeystore.p12}

# Password used to protect the keystore.
# Read from the KEYSTORE_PASSWORD environment variable (never hard-code secrets!).
server.ssl.key-store-password=${KEYSTORE_PASSWORD:changeit}

# Alias of the certificate entry inside the keystore.
server.ssl.key-alias=${KEYSTORE_ALIAS:ecikeypair}

# Enable SSL.
server.ssl.enabled=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.edu.eci.arep=INFO
