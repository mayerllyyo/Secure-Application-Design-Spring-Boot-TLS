<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Application – Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 { color: #e2e8f0; font-size: 1.5rem; margin-bottom: 8px; text-align: center; }
        p.subtitle { color: #94a3b8; font-size: 0.875rem; text-align: center; margin-bottom: 24px; }
        label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; }
        input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #e2e8f0;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #60a5fa; }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #4b5563; cursor: default; }
        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }
        #message.success { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
        #message.error   { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(34,197,94,0.15);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.3);
            margin-bottom: 20px;
        }
        .badge::before { content: '🔒'; }
        .center { text-align: center; }
        #hello-section { display: none; margin-top: 24px; }
        #hello-section h2 { color: #e2e8f0; font-size: 1rem; margin-bottom: 8px; }
        #hello-result { color: #93c5fd; font-size: 0.875rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="center"><span class="badge">TLS Secured</span></div>
    <h1>Secure Application</h1>
    <p class="subtitle">Enterprise Architecture – Spring Boot + HTTPS</p>

    <form id="login-form" novalidate>
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />

        <button type="submit" id="login-btn">Sign In</button>
    </form>

    <div id="message"></div>

    <div id="hello-section">
        <h2>Secured Endpoint Response:</h2>
        <div id="hello-result">Loading…</div>
    </div>
</div>

<script>
    const form        = document.getElementById('login-form');
    const loginBtn    = document.getElementById('login-btn');
    const messageDiv  = document.getElementById('message');
    const helloSection = document.getElementById('hello-section');
    const helloResult  = document.getElementById('hello-result');

    /**
     * Show a message banner beneath the form.
     * @param {string} text    - Message to display
     * @param {'success'|'error'} type - Visual variant
     */
    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = type;
        messageDiv.style.display = 'block';
    }

    /**
     * Asynchronously calls the /hello endpoint using Basic Auth credentials
     * returned from the login step.
     *
     * @param {string} username
     * @param {string} password
     */
    async function fetchHello(username, password) {
        const authHeader = 'Basic ' + btoa(username + ':' + password);
        try {
            const resp = await fetch('/hello', {
                headers: { 'Authorization': authHeader }
            });
            if (resp.ok) {
                const text = await resp.text();
                helloResult.textContent = text;
            } else {
                helloResult.textContent = 'Could not reach /hello: ' + resp.status;
            }
        } catch (err) {
            helloResult.textContent = 'Network error: ' + err.message;
        }
        helloSection.style.display = 'block';
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showMessage('Please enter your username and password.', 'error');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in…';
        messageDiv.style.display = 'none';

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                showMessage('✔ ' + data.message + ' – Welcome, ' + data.user + '!', 'success');
                await fetchHello(username, password);
            } else {
                showMessage('✖ ' + (data.error || 'Login failed'), 'error');
            }
        } catch (err) {
            showMessage('Network error: ' + err.message, 'error');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
